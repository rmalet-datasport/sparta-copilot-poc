name: Build and Deploy

on:
  push:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/datasport-ai/sparta-copilot

jobs:
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar -xz -C /tmp
          /tmp/gitleaks detect --source . --exit-code 1 --verbose

      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: NPM Audit
        run: |
          npm audit --audit-level=high --production || true

  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: security-scan
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest,${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: ${{ env.IMAGE_NAME }}:latest
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

  deploy:
    name: Deploy to Production
    runs-on: self-hosted
    needs: build-and-push
    environment: production
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create app directory
        run: |
          mkdir -p /opt/apps/sparta-copilot
          touch /opt/apps/sparta-copilot/.env

      - name: Create .env from GitHub Secrets
        run: |
          cat > /opt/apps/sparta-copilot/.env << EOF
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          DEMO_PASSWORD=${{ secrets.DEMO_PASSWORD }}
          DEMO_COOKIE_SECRET=${{ secrets.DEMO_COOKIE_SECRET }}
          EOF

      - name: Copy docker-compose.prod.yml
        run: |
          cp docker-compose.prod.yml /opt/apps/sparta-copilot/docker-compose.yml

      - name: Pull and deploy
        run: |
          cd /opt/apps/sparta-copilot
          docker compose pull
          docker compose up -d

      - name: Verify deployment
        run: |
          sleep 10
          docker ps | grep sparta-copilot
