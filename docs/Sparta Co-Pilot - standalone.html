document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">

--color-grey-900: #141414; /* secondary.main — near-black */\n  --color-black:    #000000;\n  --color-white:    #FFFFFF;\n\n  /* ----- Semantic status ----- */\n  --color-success-dark:  #00BC1B;\n  --color-success-main:  #00E955;\n  --color-success-light: #E8FDE9;\n\n  /* Note: in the code, `error` uses orange tones and `warning` uses yellow —\n     they are swapped from a traditional naming. Preserved verbatim. */\n  --color-error-dark:  #F57D00;\n  --color-error-main:  #FF9800;\n  --color-error-light: #FFF3E0;\n  --color-warning-dark:  #F8CA00;\n  --color-warning-main:  #F7E213;\n  --color-warning-light: #FDFFE7;\n\n  /* ----- Transparency tokens ----- */\n  --transparency-white-80: rgba(255, 255, 255, 0.8);\n  --transparency-white-25: rgba(255, 255, 255, 0.25);\n  --transparency-white-15: rgba(255, 255, 255, 0.15);\n  --transparency-grey-80:  rgba(20, 20, 20, 0.8);\n  --transparency-grey-25:  rgba(20, 20, 20, 0.25);\n  --transparency-grey-15:  rgba(20, 20, 20, 0.15);\n\n  /* ----- Semantic role tokens ----- */\n  --primary:          var(--color-red-700);\n  --primary-dark:     var(--color-red-900);\n  --primary-light:    var(--color-red-400);\n  --primary-on:       var(--color-white);\n\n  --secondary:        var(--color-grey-900);\n  --secondary-dark:   var(--color-black);\n  --secondary-light:  var(--color-grey-800);\n\n  --fg-1: var(--color-grey-900);   /* primary text */\n  --fg-2: var(--color-grey-700);   /* body / secondary text */\n  --fg-3: var(--color-grey-500);   /* tertiary / placeholder */\n  --fg-4: var(--color-grey-400);   /* disabled / assistive */\n  --fg-inverse: var(--color-white);\n\n  --bg-1: var(--color-white);      /* surface */\n  --bg-2: var(--color-grey-50);    /* subtle surface / chips */\n  --bg-3: var(--color-grey-100);   /* disabled bg */\n  --bg-inverse: var(--color-grey-900);\n\n  --border-1: var(--color-grey-200);\n  --border-2: var(--color-grey-300);\n\n  /* ----- Shape tokens ----- */\n  --radius-xs: 2px;  /* chips */\n  --radius .1235 9.49509H10.0193L10.561 4.89092L6.95679 10.4951H9.99846L9.31096 14.3076ZM7.68762 17.0303L8.68762 11.5784H5.00012L11.117 1.99988H11.976L11.2341 8.41175H15.3172L8.54658 17.0303H7.68762Z\" fill=\"#fff\"><\u002Fpath><\u002Fsvg>\n                                    Regenerate this channel\n                                  <\u002Fbutton>\n                                  <button onclick=\"{{ a.onTogglePrompt }}\" style=\"background:#fff;color:#525252;border:1px solid #D2D2D2;border-radius:4px;padding:8px 13px;font-family:var(--font-saans);font-size:12px;font-weight:570;cursor:pointer\">Close<\u002Fbutton>\n                                <\u002Fdiv>\n                              <\u002Fdiv>\n                            <\u002Fsc-if>\n                          <\u002Fdiv>\n                        <\u002Fdiv>\n                      <\u002Fsc-if>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n\n                <!-- projected performance -->\n                <sc-if value=\"{{ showProjections }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"font-family:var(--font-saans-mono);font-size:10px;letter-spacing:.04em;text-transform:uppercase;color:#8C8C8C;margin:18px 0 9px\">Projected performance<\u002Fdiv>\n                  <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:10px\">\n                    <sc-for list=\"{{ metrics }}\" as=\"m\" hint-placeholder-count=\"3\">\n                      <div style=\"border:1px solid #E3E3E3;border-radius:7px;padding:12px 13px\">\n                        <div style=\"font-size:23px;font-weight:570;color:#D6001D;letter-spacing:-.01em;line-height:1\">{{ m.value }}<\u002Fdiv>\n                        <div style=\"font-size:12px;color:#525252;margin-top:5px\">{{ m.label }}<\u002Fdiv>\n                        <div style=\"font-family:var(--font-saans-mono);font-size:10px;color:#ADADAD;margin-top:3px\">{{ m.sub }}<\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n\n                <div style=\"display:flex;gap:10px;margin-top:16px;flex-wrap:wrap\">\n                  <button style=\"display:inline-flex;align-items:center;gap:7px;background:#D6001D;color:#fff;border:none;border-radius:4px;height:44px;padding:0 18px;font-family:var(--font-saans);font-size:14px;font-weight:570;cursor:pointer\">\n                    <svg width=\"17\" height=\"17\" viewBox=\"0 0 20 20\"><path d=\"M8.10418 14.149L4.3671 10.4327L5.13293 9.64583L8.10418 12.6171L14.8671 5.875L15.6329 6.64104L8.10418 14.149Z\" fill=\"#fff\"><\u002Fpath><\u002Fsvg>\n                    Approve &amp; schedule\n                  <\u002Fbutton>\n                  <button onclick=\"{{ onGenerate }}\" style=\"display:inline-flex;align-items:center;gap:7px;background:#fff;color:#141414;border:1px solid #D2D2D2;border-radius:4px;height:44px;padding:0 18px;font-family:var(--font-saans);font-size:14px;font-weight:570;cursor:pointer\">Regenerate all<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <sc-if value=\"{{ noSeg }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"padding:30px 6px;text-align:center;font-size:13px;color:#ADADAD\">Pick an audience, then generate its campaign.<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- FOOTNOTE -->\n      <div style=\"display:flex;gap:9px;align-items:flex-start;margin-top:26px;max-width:880px\">\n        <svg width=\"17\" height=\"17\" viewBox=\"0 0 20 20\" style=\"flex:none;margin-top:1px;color:#ADADAD\"><path d=\"M9.25 14.75H10.75V9H9.25V14.75ZM10 7.2885C10.2288 7.2885 10.4207 7.21108 10.5755 7.05625C10.7303 6.90142 10.8077 6.70958 10.8077 6.48075C10.8077 6.25192 10.7303 6.06008 10.5755 5.90525C10.4207 5.75058 10.2288 5.67325 10 5.67325C9.77117 5.67325 9.57933 5.75058 9.4245 5.90525C9.26967 6.06008 9.19225 6.25192 9.19225 6.48075C9.19225 6.70958 9.26967 6.90142 9.4245 7.05625C9.57933 7.21108 9.77117 7.2885 10 7.2885ZM10 18C12.2333 18 14.125 17.225 15.675 15.675C17.225 14.125 18 12.2333 18 10C18 7.76667 17.225 5.875 15.675 4.325C14.125 2.775 12.2333 2 10 2C7.76667 2 5.875 2.775 4.325 4.325C2.775 5.875 2 7.76667 2 10C2 12.2333 2.775 14.125 4.325 15.675C5.875 17.225 7.76667 18 10 18Z\" fill=\"currentColor\"><\u002Fpath><\u002Fsvg>\n        <p style=\"font-size:12px;color:#8C8C8C;line-height:1.55\">Segments are recomputed automatically at each gate and frozen in between, so journeys already in flight are never interrupted. The only off-gate trigger is the <b style=\"color:#656565\">waitlist drop-in<\u002Fb> — when a confirmed runner withdraws, the freed spot is offered to the waitlist in real time.<\u002Fp>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900},&quot;initialLayout&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;pipeline&quot;,&quot;focus&quot;],&quot;default&quot;:&quot;pipeline&quot;,&quot;tsType&quot;:&quot;'pipeline'|'focus'&quot;},&quot;mediaStyle&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Photography&quot;,&quot;Illustration&quot;],&quot;default&quot;:&quot;Photography&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;showProjections&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nconst TONE = {\n  green:  { bg:'#E8FDE9', fg:'#00791C' },\n  yellow: { bg:'#FBF6D2', fg:'#6E5E00' },\n  amber:  { bg:'#FFF0E1', fg:'#B85600' },\n  grey:   { bg:'#EFEFEF', fg:'#525252' },\n  red:    { bg:'#FFE3E6', fg:'#BB0004' },\n};\n\nconst GATES = [\n  {\n    key:'open', name:'Registration opens', phase:'Pre-lottery', dateLabel:'Now', icon:'open',\n    goalTitle:'Pre-lottery — maximise high-quality applications',\n    goalDesc:'Before the draw closes, the AI splits the database by lifetime value and reliability so spend goes where it converts — and no one gets a generic blast.',\n    segments:[\n      { title:'Ambassadors', badge:'High value · Active', tone:'green', size:'3,420 runners',\n        desc:'2+ editions, strong engagement, never a no-show.',\n        rationale:'Your most loyal runners. Lead with status and belonging — they convert on emotion, not discounts.',\n        channels:[\n          {type:'email', name:'Email', cadence:'3-email sequence · D0, D+3, D+7', subject:'Your place in Copenhagen is waiting', body:'You helped make this race what it is. Registration is open — claim your spot before the lottery closes on 15 March.', altSubject:'Welcome back to Copenhagen, legend', alt:'You\\u2019re the reason this race feels like home. Registration for Copenhagen 2026 is open — claim your returning-runner spot before the 15 March lottery.', prompt:'Warm, status-led email for our most loyal runners. Hero photo, golden-hour finisher. Subject + one short paragraph. CTA: claim your spot before the lottery.'},\n          {type:'instagram', name:'Instagram', cadence:'Story + Reel teaser', body:'Returning legends, this one\\u2019s for you. Copenhagen 2026 entries are open \\u2014 tag a running partner you\\u2019d line up with again. \\uD83C\\uDFC3 Link in bio.', alt:'The road misses you. Copenhagen 2026 is open \\u2014 same streets, new PB. Apply before the lottery closes. Link in bio.', prompt:'15s vertical reel: fast cuts of past Copenhagen finishers crossing the line, upbeat track, end card \"Registration open\".'},\n          {type:'sms', name:'SMS', cadence:'D-2 closing reminder', body:'Copenhagen Marathon entries close in 48h. You\\u2019re one of our returning legends — apply now: cph.run/apply', alt:'48h left, legend. Copenhagen 2026 entries close soon — claim your returning spot: cph.run/apply', prompt:'One line, under 160 chars, warm + urgent, short link.'},\n          {type:'push', name:'Push', cadence:'Lottery-open alert', body:'Registration is open \\uD83D\\uDC4B Tap to claim your returning-runner spot.', alt:'Your Copenhagen spot is open \\uD83D\\uDD25 Tap to claim it.', prompt:'Short celebratory push, under 10 words, 1 emoji, taps to apply.'},\n        ],\n        metrics:[{value:'68%',label:'Open rate',sub:'vs 22% blast'},{value:'31%',label:'Click-through',sub:'vs 4% blast'},{value:'54%',label:'Applied',sub:'segment goal'}],\n      },\n      { title:'Win-back', badge:'High value · At risk', tone:'yellow', size:'5,140 runners',\n        desc:'Strong profile, email engagement down 60% year-on-year.',\n        rationale:'High lifetime value drifting away. Remind them why they started — personal, low-frequency, never spammy.',\n        channels:[\n          {type:'email', name:'Email', cadence:'2-email re-engagement · D0, D+5', subject:'We saved your bib number', body:'It\\u2019s been a while. Copenhagen 2026 is open and your spot from last time is still here. One click to be part of it again.', altSubject:'Your bib number is still here', alt:'We kept your bib number warm. Copenhagen 2026 is open and your place from last time is waiting — one click to come back.', prompt:'Personal, low-pressure re-engagement. One warm paragraph, no discount. Soft CTA.'},\n          {type:'sms', name:'SMS', cadence:'D+7 personal nudge', body:'Miss the start line? Copenhagen Marathon 2026 registration is open. Welcome back: cph.run/back', alt:'The start line misses you. Copenhagen 2026 is open — come back: cph.run/back', prompt:'Friendly nudge, under 160 chars, no pressure, short link.'},\n        ],\n        metrics:[{value:'41%',label:'Open rate',sub:'vs 22% blast'},{value:'14%',label:'Click-through',sub:'reactivation'},{value:'19%',label:'Reactivated',sub:'segment goal'}],\n      },\n      { title:'Opportunists', badge:'Low value · Active', tone:'amber', size:'8,830 runners',\n        desc:'Apply every edition, frequent no-shows (DNS 38%).',\n        rationale:'Engaged but unreliable. Don\\u2019t overspend — a single touch that nudges real commitment.',\n        channels:[\n          {type:'email', name:'Email', cadence:'1 email · D0', subject:'Lock in your Copenhagen 2026 spot', body:'Entries are open. Secure your place now — confirmed runners get priority access to 2027.', altSubject:'Secure your 2026 place (and 2027 priority)', alt:'Entries are open. Confirm your Copenhagen 2026 place now and unlock priority access to 2027.', prompt:'Single direct email, commitment-focused, mention 2027 priority. Subject + short paragraph.'},\n          {type:'push', name:'Push', cadence:'D-3 reminder', body:'Copenhagen Marathon entries are open. Don\\u2019t miss out.', alt:'Copenhagen entries close soon — secure your place.', prompt:'Short reminder push, under 10 words, no emoji.'},\n        ],\n        metrics:[{value:'52%',label:'Open rate',sub:'vs 22% blast'},{value:'18%',label:'Click-through',sub:''},{value:'44%',label:'Applied',sub:'segment goal'}],\n      },\n      { title:'Cold prospects', badge:'Low value · Cold', tone:'grey', size:'13,910 runners',\n        desc:'From external lists, no Sparta history.',\n        rationale:'Unknown audience. One low-cost, brand-led touch to test interest — measure before investing.',\n        channels:[\n          {type:'email', name:'Email', cadence:'1 intro email · D0', subject:'Run the most beautiful marathon in Scandinavia', body:'42.195 km through the heart of Copenhagen. Registration for 2026 is open to everyone — discover the race.', altSubject:'Discover the Copenhagen Marathon', alt:'Scandinavia\\u2019s most beautiful 42.195 km. Copenhagen 2026 registration is open to everyone — see the route, feel the city.', prompt:'Brand-led intro to a cold audience. Inspirational, low-cost, discover the race. Subject + short paragraph.'},\n        ],\n        metrics:[{value:'24%',label:'Open rate',sub:'cold list'},{value:'6%',label:'Click-through',sub:''},{value:'4%',label:'Applied',sub:'test cohort'}],\n      },\n    ],\n  },\n  {\n    key:'lottery', name:'Lottery result', phase:'Post-lottery', dateLabel:'15 Mar', icon:'lottery',\n    goalTitle:'Post-lottery — convert winners, retain everyone else',\n    goalDesc:'The moment results drop is the most emotional of the year. The AI separates winners from the unselected and turns disappointment into the next opportunity.',\n    segments:[\n      { title:'Confirmed winners', badge:'Won spot · High intent', tone:'green', size:'12,500 runners',\n        desc:'Drawn in the lottery — now they need to pay and commit.',\n        rationale:'Hottest moment of the year. Celebrate first, then make payment frictionless before the excitement fades.',\n        channels:[\n          {type:'push', name:'Push', cadence:'Instant result', body:'\\uD83C\\uDF89 Lottery result: you got a spot! Tap to confirm.', alt:'\\uD83C\\uDF89 You\\u2019re in for Copenhagen 2026! Tap to confirm your bib.', prompt:'Instant celebratory result push, 1 emoji, taps to confirm.'},\n          {type:'email', name:'Email', cadence:'Confirmation + payment · D0', subject:'\\uD83C\\uDF89 You\\u2019re in! See you in Copenhagen', body:'Congratulations — you\\u2019ve secured a place in the 2026 Copenhagen Marathon. Complete your registration within 7 days to confirm your bib.', altSubject:'Confirmed: your Copenhagen 2026 bib', alt:'It\\u2019s official — you\\u2019re running Copenhagen 2026. Finish your registration within 7 days to lock your bib and start the countdown.', prompt:'Celebration + frictionless payment. Hero photo. Subject + short paragraph, clear 7-day deadline.'},\n          {type:'sms', name:'SMS', cadence:'D-3 payment reminder', body:'You\\u2019re IN for Copenhagen 2026! Complete payment by Sunday to lock your bib: cph.run/pay', alt:'Don\\u2019t lose your spot! Pay by Sunday to confirm your Copenhagen 2026 bib: cph.run/pay', prompt:'Payment reminder, under 160 chars, upbeat, deadline + link.'},\n        ],\n        metrics:[{value:'81%',label:'Open rate',sub:'peak intent'},{value:'59%',label:'Click-through',sub:''},{value:'74%',label:'Paid in 7d',sub:'segment goal'}],\n      },\n      { title:'Not selected — high value', badge:'Missed draw · Retain', tone:'yellow', size:'6,200 runners',\n        desc:'Strong runners who missed the draw this year.',\n        rationale:'Disappointment is a retention risk. Offer a real path forward — priority waitlist and a sister event.',\n        channels:[\n          {type:'email', name:'Email', cadence:'Consolation + waitlist · D0', subject:'Not this time — but we\\u2019ve got you', body:'You weren\\u2019t drawn this year, but you\\u2019re first in line. Join the priority waitlist, or take your training to the Copenhagen Half in September.', altSubject:'You\\u2019re first on the waitlist', alt:'The draw didn\\u2019t go your way this year — but you\\u2019re top of the priority waitlist, and the Copenhagen Half in September is wide open.', prompt:'Empathetic consolation + clear path forward (priority waitlist + sister event). Subject + short paragraph.'},\n          {type:'sms', name:'SMS', cadence:'D+2 waitlist invite', body:'Priority waitlist for Copenhagen 2026 is open to you first. Join in one tap: cph.run/waitlist', alt:'You\\u2019re first in line for Copenhagen 2026. Lock your priority waitlist spot: cph.run/waitlist', prompt:'Waitlist invite, under 160 chars, reassuring, link.'},\n        ],\n        metrics:[{value:'64%',label:'Open rate',sub:''},{value:'28%',label:'Click-through',sub:''},{value:'41%',label:'Joined waitlist',sub:'segment goal'}],\n      },\n      { title:'Not selected — casual', badge:'Missed draw · Light', tone:'grey', size:'9,400 runners',\n        desc:'Lower-engagement applicants who missed out.',\n        rationale:'Light touch only. Keep the door open without heavy spend.',\n        channels:[\n          {type:'email', name:'Email', cadence:'1 waitlist invite · D0', subject:'Your Copenhagen waitlist spot', body:'The lottery\\u2019s done for 2026, but spots open up. Join the waitlist and we\\u2019ll notify you the moment one frees up.', altSubject:'Join the Copenhagen waitlist', alt:'Spots open up every year. Join the Copenhagen 2026 waitlist and we\\u2019ll ping you the moment one frees up.', prompt:'Light, low-cost waitlist invite. One short paragraph.'},\n        ],\n        metrics:[{value:'38%',label:'Open rate',sub:''},{value:'9%',label:'Click-through',sub:''},{value:'12%',label:'Joined waitlist',sub:''}],\n      },\n      { title:'Waitlist drop-in', badge:'Real-time trigger', tone:'red', size:'Live · off-gate',\n        desc:'A confirmed runner just withdrew — offer the freed spot.',\n        rationale:'The only off-gate trigger. Speed wins — first to pay takes the spot, so go instant and multi-channel.',\n        channels:[\n          {type:'push', name:'Push', cadence:'Instant', body:'A Copenhagen spot just opened — claim it now \\u26A1', alt:'\\u26A1 A Copenhagen spot just opened — claim it before it\\u2019s gone.', prompt:'Instant urgent push, 1 emoji, taps to claim.'},\n          {type:'sms', name:'SMS', cadence:'Instant', body:'You\\u2019re up! A Copenhagen Marathon spot is yours if you claim it in 24h: cph.run/claim', alt:'Quick! A Copenhagen 2026 spot is yours if you claim within 24h: cph.run/claim', prompt:'Instant claim SMS, under 160 chars, urgent, 24h window + link.'},\n          {type:'email', name:'Email', cadence:'Instant + 12h reminder', subject:'A spot just opened — it\\u2019s yours if you\\u2019re fast', body:'Good news: a place in Copenhagen 2026 just opened up and you\\u2019re next on the waitlist. Claim it in the next 24 hours.', altSubject:'Your Copenhagen spot just opened', alt:'A place in Copenhagen 2026 just freed up and you\\u2019re next. It\\u2019s yours if you claim within 24 hours — don\\u2019t let it pass.', prompt:'Urgent but warm \"spot opened\" email + 12h reminder. Subject + short paragraph.'},\n
